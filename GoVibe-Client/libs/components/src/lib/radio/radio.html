<section class="space-y-2" [ngClass]="class">
    <h3 class="section-title">{{ label }}</h3>
    <div class="grid gap-3" [class]="'grid-cols-' + options.length">
        @for (opt of options; track $index) {
            <label class="radio" [class]="variant">
                @if (field) {
                    <input
                        type="radio"
                        [value]="opt.value"
                        [formField]="field"
                        (change)="emitChange(opt.value)"
                    />
                } @else {
                    <input
                        [name]="name"
                        type="radio"
                        [value]="opt.value"
                        [checked]="modelValue === opt.value"
                        (change)="onNgModelChange(opt.value)"
                    />
                }
                <span class="radio-custom"></span>
                <span class="radio-label">{{ opt.label }}</span>
            </label>
        }
    </div>
</section>
