<div class="flex items-center justify-end gap-2 p-4 border-t pagination-container">
    <button
        (click)="prevPage()"
        class="px-3 py-1.5 text-sm border rounded-md transition pagination-btn"
    >
        Prev
    </button>

    @for (page of visiblePages; track page) {
        <button
            (click)="goToPage(page)"
            class="px-3 py-1.5 text-sm border rounded-md transition-all duration-200 pagination-btn"
            [ngClass]="{
                'active-page': page === pageIndex,
                'inactive-page': page !== pageIndex,
            }"
        >
            {{ page }}
        </button>
    }

    <button
        (click)="nextPage()"
        class="px-3 py-1.5 text-sm border rounded-md transition pagination-btn"
    >
        Next
    </button>
</div>
