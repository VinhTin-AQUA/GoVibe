<header
    class="app-header flex items-center justify-end h-12 px-4 border-b transition-colors duration-300"
>
    <div class="flex items-center gap-4">
        <button
            (click)="toggleTheme()"
            class="theme-toggle relative w-14 h-7 rounded-full flex items-center px-1 transition duration-300"
        >
            <!-- Sun -->
            <svg class="w-4 h-4 theme-icon-sun" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M12 4.5V2m0 20v-2.5M4.5 12H2m20 0h-2.5M6.34 6.34L4.93 4.93m14.14 14.14l-1.41-1.41M6.34 17.66l-1.41 1.41m14.14-14.14l-1.41 1.41M12 7a5 5 0 100 10 5 5 0 000-10z"
                />
            </svg>

            <!-- Moon -->
            <svg class="w-4 h-4 ml-auto theme-icon-moon" fill="currentColor" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1111.21 3c0 .34.02.68.05 1.02A7 7 0 0021 12.79z" />
            </svg>

            <!-- Knob -->
            <span
                class="theme-toggle-knob absolute top-0.5 left-0.5 w-6 h-6 rounded-full shadow transform transition duration-300"
                [class.translate-x-7]="isDark"
            ></span>
        </button>

        <!-- Avatar -->
        <div class="relative avatar-menu">
            <img
                src="https://i.pravatar.cc/40"
                (click)="toggleMenu()"
                class="avatar-img w-9 h-9 rounded-full cursor-pointer ring-2 transition"
            />

            <!-- Dropdown -->
            @if (menuOpen) {
                <div
                    class="dropdown-menu absolute right-0 mt-3 w-44 origin-top-right rounded-lg shadow-lg transform transition-all duration-200 animate-dropdown"
                >
                    <button class="dropdown-item w-full text-left px-4 py-2">Profile</button>

                    <button class="dropdown-item w-full text-left px-4 py-2">Settings</button>

                    <button
                        (click)="logout()"
                        class="dropdown-item dropdown-danger w-full text-left px-4 py-2"
                    >
                        Logout
                    </button>
                </div>
            }
        </div>
    </div>
</header>
