<div class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Category Management</h1>
            <p class="text-sm text-gray-500">Manage product categories</p>
        </div>

        <button
            (click)="openAddModal()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow"
        >
            + Add Category
        </button>
    </div>

    <!-- Search -->
    <div class="bg-white p-4 rounded-xl shadow mb-6">
        <input
            type="text"
            placeholder="Search category..."
            [(ngModel)]="search"
            class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
        />
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow flex flex-col h-[calc(100vh-180px)]">
        <!-- TABLE -->
        <div class="overflow-auto flex-1">
            <table class="w-full min-w-225 text-left">
                <thead class="bg-gray-100 text-gray-600 text-sm sticky top-0">
                    <tr>
                        <th class="p-4">#</th>
                        <th class="p-4">Category Name</th>
                        <th class="p-4">Description</th>
                        <th class="p-4">Updated</th>
                        <th class="p-4 text-center">Actions</th>
                    </tr>
                </thead>

                <tbody class="divide-y divide-gray-200">
                    @for (c of categories; track $index) {
                        <tr class="hover:bg-gray-50">
                            <td class="p-4">
                                {{ $index + 1 }}
                            </td>

                            <td class="p-4 font-medium text-gray-700">
                                {{ c.name }}
                            </td>

                            <td class="p-4 text-gray-500">
                                {{ c.description }}
                            </td>

                            <td class="p-4 text-gray-500">
                                {{ c.updatedAt | date }}
                            </td>

                            <td class="p-4 flex justify-center gap-2">
                                <button
                                    (click)="openEditModel(c)"
                                    class="px-3 py-1 text-sm bg-yellow-400 hover:bg-yellow-500 text-white rounded"
                                >
                                    Edit
                                </button>

                                <button
                                    (click)="openDeleteCategory(c)"
                                    class="px-3 py-1 text-sm bg-red-500 hover:bg-red-600 text-white rounded"
                                >
                                    Delete
                                </button>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>

        <!-- PAGINATION -->
        <lib-pagination
            [pageIndex]="pageIndex"
            [totalPages]="totalPages"
            (pageChange)="onPageChange($event)"
        ></lib-pagination>
    </div>

    <!-- Modal -->
    @if (showUpsertModal()) {
        <app-add-category (closeModel)="closeModal($event)" [editing]="editing"></app-add-category>
    }

    @if(showDeleteModal()) {
         <lib-question-cancel-dialog
            (close)="deletePlace($event)"
            [isSuccess]="false"
            [message]="'Delete Place'"
            [title]="'Do you want to delete this Place'"
        ></lib-question-cancel-dialog>
    }
</div>
