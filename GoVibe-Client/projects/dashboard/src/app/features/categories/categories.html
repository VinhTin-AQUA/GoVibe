<div class="category-page">
    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
        <div>
            <h1 class="page-title text-2xl font-bold">Category Management</h1>
            <p class="page-subtitle text-sm">Manage product categories</p>
        </div>

        <button (click)="openAddModal()" class="btn-primary px-4 py-2 rounded-lg shadow">
            + Add Category
        </button>
    </div>

    <!-- Search -->
    <!-- <div>
        <lib-text-input
            placeholder="Search category... "
            [(ngModel)]="searchString"
            class="p-4 rounded-xl shadow mb-6"
        ></lib-text-input>
    </div> -->

    <div class="flex flex-col md:flex-row items-center gap-2">
        <lib-text-input
            placeholder="Search category..."
            [(ngModel)]="searchString"
            class="flex-1 p-4 rounded-xl shadow mb-0"
        ></lib-text-input>

        <button
            (click)="getCategories()"
            class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-xl shadow transition"
        >
            Search
        </button>
    </div>

    <!-- Table -->
    <div class="card rounded-xl shadow flex flex-col h-[calc(100vh-245px)]">
        <div class="overflow-auto flex-1">
            <table class="w-full min-w-225 text-left">
                <thead class="table-head text-sm sticky top-0">
                    <tr>
                        <th class="p-4">#</th>
                        <th class="p-4">Category Name</th>
                        <th class="p-4">Description</th>
                        <th class="p-4">Updated</th>
                        <th class="p-4 text-center">Actions</th>
                    </tr>
                </thead>

                <tbody class="table-body">
                    @for (c of categories(); track $index) {
                        <tr class="table-row">
                            <td class="p-4">
                                {{ $index + 1 }}
                            </td>

                            <td class="p-4 font-medium category-name">
                                {{ c.name }}
                            </td>

                            <td class="p-4 text-muted">
                                {{ c.description }}
                            </td>

                            <td class="p-4 text-muted">
                                {{ c.updatedAt | date }}
                            </td>

                            <td class="p-4 flex justify-center gap-2">
                                <button
                                    (click)="openEditModel(c)"
                                    class="btn-warning px-3 py-1 text-sm rounded"
                                >
                                    Edit
                                </button>

                                <button
                                    (click)="openDeleteCategory(c)"
                                    class="btn-danger px-3 py-1 text-sm rounded"
                                >
                                    Delete
                                </button>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>

        <!-- PAGINATION -->
        <lib-pagination
            [pageIndex]="pageIndex"
            [totalPages]="totalPages"
            (pageChange)="onPageChange($event)"
        ></lib-pagination>
    </div>

    <!-- Modal -->
    @if (showUpsertModal()) {
        <app-upsert-category
            (closeModel)="closeModal($event)"
            [categoryId]="categoryIdUpdate"
            (reload)="getCategories()"
        ></app-upsert-category>
    }

    @if (showDeleteModal()) {
        <lib-question-cancel-dialog
            (close)="deletePlace($event)"
            [isSuccess]="false"
            [message]="'Delete Category'"
            [title]="'Do you want to delete this category?'"
        ></lib-question-cancel-dialog>
    }
</div>
