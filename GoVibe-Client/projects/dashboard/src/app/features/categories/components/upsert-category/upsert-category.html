<div class="modal-overlay fixed inset-0 flex items-center justify-center">
    <div class="category-modal rounded-xl shadow-lg w-100 p-6">
        <h2 class="text-lg font-semibold mb-4">
            {{ categoryId ? 'Edit Category' : 'Add Category' }}
        </h2>

        <div class="space-y-4">
            <lib-text-input placeholder="Category Name" [formField]="addCategoryForm.name">
            </lib-text-input>

            <lib-text-area
                placeholder="Description"
                [formField]="addCategoryForm.description"
            ></lib-text-area>
        </div>

        <div class="flex justify-end gap-2 mt-6">
            <button (click)="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">
                Cancel
            </button>

            <button (click)="saveCategory()" class="btn-primary px-4 py-2 rounded-lg">Save</button>
        </div>
    </div>
</div>
