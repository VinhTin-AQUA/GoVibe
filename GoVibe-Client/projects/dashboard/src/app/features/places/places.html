<div class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Place Management</h1>
            <p class="text-sm text-gray-500">Manage places</p>
        </div>

        <button
            (click)="openModal()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow"
        >
            + Add Place
        </button>
    </div>

    <!-- Search -->
    <div class="bg-white p-4 rounded-xl shadow mb-6">
        <input
            type="text"
            placeholder="Search place..."
            [(ngModel)]="search"
            class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none"
        />
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
        <div class="overflow-auto max-h-150">
            <table class="w-full min-w-225 text-left">
                <thead class="bg-gray-100 text-gray-600 text-sm sticky top-0">
                    <tr>
                        <th class="p-4">#</th>
                        <th class="p-4 w-75">Name</th>
                        <th class="p-4">Average Rating</th>
                        <th class="p-4">Total Reviews</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Updated At</th>
                        <th class="p-4">Category</th>
                        <th class="p-4 text-center">Actions</th>
                    </tr>
                </thead>

                <tbody>
                    @for (p of places; track $index) {
                        <tr class="border-t hover:bg-gray-50">
                            <td class="p-4">{{ $index + 1 }}</td>

                            <td class="p-4 font-medium text-gray-700">
                                <div class="line-clamp-1">
                                    {{ p.name }}
                                </div>
                            </td>

                            <td class="p-4 text-gray-500">
                                {{ p.averageRating }}
                            </td>

                            <td class="p-4">
                                {{ p.totalReviews }}
                            </td>

                            <td class="p-4">
                                {{ p.status }}
                            </td>

                            <td class="p-4 text-gray-500">
                                {{ p.updatedAt | date }}
                            </td>

                            <td class="p-4 text-gray-500">
                                {{ p.category.name }}
                            </td>

                            <td class="p-4 flex justify-center gap-2">
                                <button
                                    (click)="editPlace(p)"
                                    class="px-3 py-1 text-sm bg-yellow-400 hover:bg-yellow-500 text-white rounded"
                                >
                                    Edit
                                </button>

                                <button
                                    (click)="deletePlace(p)"
                                    class="px-3 py-1 text-sm bg-red-500 hover:bg-red-600 text-white rounded"
                                >
                                    Delete
                                </button>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    @if (!showModal) {
        <div
            class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50"
        >
            <!-- <app-upsert-place></app-upsert-place> -->
            <app-text-editor></app-text-editor>
        </div>
    }
</div>
