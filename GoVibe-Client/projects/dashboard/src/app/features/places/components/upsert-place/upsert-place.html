<div class="w-[90vw] max-w-6xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
    <div class="max-h-[90vh] overflow-y-auto">
        <h1
            class="sticky top-0 z-10 bg-white text-3xl font-semibold text-gray-800 border-b px-5 pt-5 pb-2"
        >
            Add Place
        </h1>
        <div class="grid grid-cols-4 gap-1 p-5">
            <lib-text-input
                class="col-span-4"
                label="Name"
                [formField]="placeForm.name"
                placeholder=""
            ></lib-text-input>

            <lib-text-input
                class="col-span-3"
                label="Address"
                [formField]="placeForm.address"
            ></lib-text-input>

            <lib-text-input
                class=""
                label="Country"
                [formField]="placeForm.country"
            ></lib-text-input>

            <lib-text-input class="" label="Phone" [formField]="placeForm.phone"></lib-text-input>

            <lib-text-input
                class=""
                label="Opening Hours"
                [formField]="placeForm.openingHours"
            ></lib-text-input>
            <lib-text-input
                class=""
                label="Website"
                [formField]="placeForm.website"
            ></lib-text-input>

            <lib-select-box
                label="Category"
                [formField]="placeForm.categoryId"
                [options]="categories()"
                optionLabel="label"
                optionValue="value"
                value="Arrial"
            ></lib-select-box>

            <app-text-editor
                class="col-span-4"
                [formField]="placeForm.description"
            ></app-text-editor>

            <div class="col-span-4 flex justify-end gap-4 pt-6 border-t">
                <button
                    type="button"
                    (click)="handleClosePopup()"
                    class="px-6 py-2 rounded-lg border border-gray-300 hover:bg-gray-100 transition"
                >
                    Cancel
                </button>

                <button
                    type="button"
                    (click)="save()"
                    class="px-8 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 shadow transition"
                >
                    Save
                </button>
            </div>
        </div>
    </div>
</div>
