<div
    class="w-[90vw] max-w-6xl max-h-[90vh] overflow-y-auto mx-auto bg-white rounded-2xl shadow-2xl p-10"
>
    <h1 class="text-3xl font-semibold mb-8 text-gray-800 border-b pb-4">Add Place</h1>

    <form class="grid grid-cols-4 gap-1">
        <lib-text-input
            class="col-span-4"
            label="Name"
            [formField]="placeForm.name"
            placeholder=""
        ></lib-text-input>

        <lib-text-input
            class="col-span-3"
            label="Address"
            [formField]="placeForm.address"
        ></lib-text-input>

        <lib-text-input class="" label="Country" [formField]="placeForm.country"></lib-text-input>

        <lib-text-input class="" label="Phone" [formField]="placeForm.phone"></lib-text-input>

        <lib-text-input
            class=""
            label="Opening Hours"
            [formField]="placeForm.openingHours"
        ></lib-text-input>
        <lib-text-input class="" label="Website" [formField]="placeForm.website"></lib-text-input>

        <lib-text-input
            class=""
            label="CategoryId"
            [formField]="placeForm.categoryId"
        ></lib-text-input>

        <div class="col-span-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea
                rows="4"
                [formField]="placeForm.description"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            ></textarea>
        </div>

        <div class="col-span-4 flex justify-end gap-4 pt-6 border-t">
            <button
                type="button"
                class="px-6 py-2 rounded-lg border border-gray-300 hover:bg-gray-100 transition"
            >
                Cancel
            </button>

            <button
                type="button"
                (click)="save()"
                class="px-8 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 shadow transition"
            >
                Save
            </button>
        </div>
    </form>
</div>
