<div
    class="w-[90vw] max-w-6xl max-h-[90vh] overflow-y-auto mx-auto bg-white rounded-2xl shadow-2xl p-10"
>
    <h1 class="text-3xl font-semibold mb-8 text-gray-800 border-b pb-4">Thêm Place</h1>

    <form class="grid grid-cols-3 gap-6">
        <div class="col-span-3">
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input
                type="text"
                [formField]="placeForm.name"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
            />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Street</label>
            <input
                type="text"
                [formField]="placeForm.street"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
            <input
                type="text"
                [formField]="placeForm.city"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
            <input
                type="text"
                [formField]="placeForm.phone"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">District</label>
            <input
                type="text"
                [formField]="placeForm.district"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ward</label>
            <input
                type="text"
                [formField]="placeForm.ward"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
            <input
                type="text"
                [formField]="placeForm.country"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Opening Hours</label>
            <input
                type="text"
                [formField]="placeForm.openingHours"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Website</label>
            <input
                type="text"
                [formField]="placeForm.website"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
        </div>

        <div class="col-span-3">
            <label class="block text-sm font-medium text-gray-700 mb-1">CategoryId</label>
            <input
                type="text"
                [formField]="placeForm.categoryId"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
        </div>

        <div class="col-span-3">
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea
                rows="4"
                [formField]="placeForm.description"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            ></textarea>
        </div>

        <div class="col-span-3 flex justify-end gap-4 pt-6 border-t">
            <button
                type="button"
                class="px-6 py-2 rounded-lg border border-gray-300 hover:bg-gray-100 transition"
            >
                Cancel
            </button>

            <button
                type="button"
                (click)="save()"
                class="px-8 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 shadow transition"
            >
                Save
            </button>
        </div>
    </form>
</div>
